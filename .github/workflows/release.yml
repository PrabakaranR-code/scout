name: Release

# The RELEASE file at the repo root names the version to publish. When a
# change to it lands on main, this workflow tests the tree, then creates the
# tag and the GitHub release with CHANGELOG.md as notes (skipping silently if
# that tag is already released). Tag-push and manual dispatch also work where
# credentials allow them.
on:
  push:
    branches: [main]
    paths: ["RELEASE"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test before publishing
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest -q
      - name: Create GitHub release with changelog
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$(tr -d '[:space:]' < RELEASE)"
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $TAG already exists; nothing to do"
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "SCOUT $TAG" \
            --notes-file CHANGELOG.md
